<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Smart Healthcare</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="landing-page">
  <main class="landing">
    <section class="landing-hero">
      <h1>Login</h1>
      <p>Select your role and sign in.</p>
    </section>

    <section class="card">
      <div class="form-row">
        <select id="role">
          <option value="patient">Patient</option>
          <option value="doctor">Doctor</option>
          <option value="admin">Admin</option>
        </select>
        <input id="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
        <button id="login-btn">Login</button>
      </div>
      <div id="status" class="status-text"></div>
      <p style="margin-top:10px;">No account? <a href="signup.html">Sign up</a></p>
    </section>
  </main>

  <script>
    document.getElementById('login-btn').onclick = async () => {
      const role = document.getElementById('role').value;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role, email, password })
      });
      const data = await res.json();
      if (!res.ok) return (document.getElementById('status').textContent = data.error || 'Login failed');

      if (role === 'patient') location.href = 'patient.html';
      if (role === 'doctor') location.href = 'doctor.html';
      if (role === 'admin')  location.href = 'admin.html';
    };
  </script>
</body>
</html>
